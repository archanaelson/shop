<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Flip Card</title>
<style>
/* Global Styles */
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
}

/* Card Container */
.card-container {
  perspective: 1500px;
  width: 300px;
  height: 400px;
}

/* Card */
.card {
  width: 100%;
  height: 100%;
  border-radius: 15px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  transition: transform 0.8s;
  transform-style: preserve-3d;
  position: relative;
}

/* Flip on hover */
.card-container:hover .card {
  transform: rotateY(180deg);
}

/* Front & Back */
.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #fff;
  padding: 20px;
  box-sizing: border-box;
}

/* Front Style */
.card-front {
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  font-size: 1.2rem;
  text-align: center;
}

/* Back Style */
.card-back {
  background: linear-gradient(135deg, #43cea2, #185a9d);
  transform: rotateY(180deg);
  font-size: 1rem;
  text-align: center;
}

/* Button Hover Effect */
.button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #fff;
  color: #333;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s ease;
}

.button:hover {
  background: #ff4b5c;
  color: white;
  transform: scale(1.1);
}

/* Responsive */
@media(max-width: 400px){
  .card-container{
    width: 250px;
    height: 350px;
  }
}
</style>
</head>
<body>

<!-- Card Container -->
<div class="card-container">
  <div class="card">
    
    <!-- Front Side -->
    <div class="card-front">
      <h1>🎉 Happy Birthday! 🎉</h1>
      <p>Wishing you joy, happiness, and success!</p>
      <button class="button" onclick="toggleMusic()">Play Music 🎵</button>
    </div>

    <!-- Back Side -->
    <div class="card-back">
      <h1>💖 You are Awesome! 💖</h1>
      <p>Enjoy your special day and keep shining!</p>
      <button class="button" onclick="toggleMusic()">Play Music 🎵</button>
    </div>
    
  </div>
</div>

<!-- Background Music -->
<audio id="bg-music" loop>
  <source src="./a1.mp3" type="audio/mp3">
</audio>

<script>
function toggleMusic(){
  const music = document.getElementById('bg-music');
  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}
</script>

</body>
</html>
